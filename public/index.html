<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitFuel | Smart Gym Diet Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.95)),
    url("https://images.unsplash.com/photo-1554284126-aa88f22d8b74");
  background-size:cover;
  background-position:center;
  color:white;
  display:flex;
  flex-direction:column;
}

/* NAVBAR */
nav{
  width:100%;
  padding:20px 60px;
  background:rgba(2,6,23,0.85);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:24px;
  font-weight:600;
}

.logo span{
  color:#22c55e;
}

/* HERO SECTION */
.hero{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:48px;
  margin-bottom:15px;
}

.hero p{
  font-size:18px;
  opacity:0.8;
  margin-bottom:30px;
  max-width:600px;
}

.buttons{
  display:flex;
  gap:20px;
}

.btn{
  padding:12px 30px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.primary{
  background:#22c55e;
  color:black;
}

.primary:hover{
  box-shadow:0 10px 25px rgba(34,197,94,0.6);
}

.secondary{
  background:#22c55e;
  color:rgb(33, 27, 27);
}

.secondary:hover{
  box-shadow:0 10px 25px rgba(34, 219, 24, 0.623);
}
</style>
</head>

<body>

<nav>
  <div class="logo">Fit<span>Fuel</span></div>
</nav>

<div class="hero">
  <h1>Build Your Best Body</h1>
  <p>
    Personalized gym diet and workout suggestions based on your BMI,
    goals, and fitness profile.
  </p>

  <div class="buttons">
    <a href="login.html" class="btn primary">Login</a>
    <a href="register.html" class="btn secondary">Register</a>
  </div>
</div>

</body>
</html>
