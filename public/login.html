<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | FitFuel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{
  min-height:100vh;
  background: linear-gradient(rgba(2,6,23,0.85),rgba(2,6,23,0.95)),
    url("https://images.unsplash.com/photo-1517963879433-6ad2b056d712");
  background-size:cover; background-position:center; color:white;
}
nav{
  position:fixed; top:0; width:100%; padding:18px 50px;
  background:rgba(2,6,23,0.8); backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center; z-index:1000;
}
.logo{ font-size:24px; font-weight:600; }
.logo span{ color:#22c55e; }
.container{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding-top:60px; }
.login-box{
  width:360px; padding:40px; text-align:center;
  background:rgba(255,255,255,0.06); backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.25); border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6); animation:fadeUp 0.8s ease;
}
@keyframes fadeUp{ from{opacity:0;transform:translateY(40px);} to{opacity:1;transform:translateY(0);} }
.login-box h2{ margin-bottom:20px; color:#22c55e; }
.login-box input{
  width:100%; padding:14px; margin:12px 0;
  border-radius:8px; border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.3); color:white; outline:none; font-size:14px; transition:0.3s;
}
.login-box input::placeholder{ color:rgba(255,255,255,0.5); }
.login-box input:focus{ border-color:#22c55e; box-shadow:0 0 10px rgba(34,197,94,0.4); }
.login-box button{
  width:100%; padding:14px; margin-top:20px; border:none;
  border-radius:30px; background:#22c55e; font-size:16px;
  font-weight:600; cursor:pointer; transition:0.3s;
}
.login-box button:hover{ transform:translateY(-2px); box-shadow:0 10px 25px rgba(34,197,94,0.6); }
.login-box button:disabled{ opacity:0.6; cursor:not-allowed; }
#msg{ margin-top:15px; font-size:14px; color:#f87171; min-height:20px; }
.register-link{ margin-top:15px; display:block; color:#22c55e; text-decoration:none; font-size:14px; }
</style>
</head>
<body>
<nav>
  <div class="logo">Fit<span>Fuel</span></div>
  <a href="register.html" style="color:#22c55e;text-decoration:none;">Register</a>
</nav>
<div class="container">
  <div class="login-box">
    <h2>Welcome Back 👋</h2>
    <input id="emailInput"    placeholder="Email" type="email">
    <input id="passwordInput" placeholder="Password" type="password">
    <button id="loginBtn" onclick="login()">Login</button>
    <p id="msg"></p>
    <a href="register.html" class="register-link">Don't have an account? Register</a>
  </div>
</div>
<script>
const API = "https://fitfuel-production-5ad6.up.railway.app";
 
function login() {
  const emailVal = document.getElementById('emailInput').value.trim();
  const passVal  = document.getElementById('passwordInput').value.trim();
  const msg      = document.getElementById('msg');
  const btn      = document.getElementById('loginBtn');
 
  if (!emailVal || !passVal) {
    msg.innerText = "❌ Please enter email and password.";
    return;
  }
 
  btn.disabled = true;
  btn.textContent = "Logging in...";
  msg.innerText = "";
 
  fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: emailVal, password: passVal })
  })
  .then(res => res.json())
  .then(data => {
    btn.disabled = false;
    btn.textContent = "Login";
 
    if (data.error) {
      msg.innerText = "❌ " + data.error;
      msg.style.color = "#f87171";
    } else {
      // Save user to localStorage
      localStorage.setItem('user', JSON.stringify({
        userId: data.userId,
        name:   data.name,
        email:  data.email
      }));
      msg.innerText = "✅ Login successful! Redirecting...";
      msg.style.color = "#22c55e";
      setTimeout(() => { location.href = "profile.html"; }, 800);
    }
  })
  .catch(() => {
    btn.disabled = false;
    btn.textContent = "Login";
    msg.innerText = "❌ Cannot connect to server. Make sure server is running.";
    msg.style.color = "#f87171";
  });
}
 
// Press Enter to submit
document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
