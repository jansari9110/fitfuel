<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile | FitFuel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{
  min-height:100vh;
  background: linear-gradient(rgba(2,6,23,0.85),rgba(2,6,23,0.95)),
    url("https://images.unsplash.com/photo-1554284126-aa88f22d8b74");
  background-size:cover; background-position:center; color:white;
}
nav{
  position:fixed; width:100%; top:0; padding:18px 50px;
  background:rgba(2,6,23,0.85); backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center; z-index:1000;
}
.logo{ font-size:24px; font-weight:600; }
.logo span{ color:#22c55e; }
nav a{ color:white; text-decoration:none; margin-left:20px; transition:0.3s; }
nav a:hover{ color:#22c55e; }
 
.container{ padding:100px 20px 40px; display:flex; flex-direction:column; align-items:center; gap:20px; }
 
/* Plan Badge */
.plan-badge{
  background:rgba(34,197,94,0.1); border:1px solid #22c55e;
  border-radius:12px; padding:14px 30px; text-align:center;
  width:100%; max-width:460px;
}
.plan-badge h3{ color:#22c55e; font-size:15px; margin-bottom:4px; }
.plan-badge p{ font-size:13px; opacity:0.75; }
.plan-badge a{
  display:inline-block; margin-top:10px; padding:7px 20px;
  background:#22c55e; color:#020617; border-radius:20px;
  font-size:13px; font-weight:600; text-decoration:none;
}
 
/* Profile Card */
.profile{
  width:100%; max-width:460px;
  background:rgba(255,255,255,0.06); backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.25); border-radius:20px;
  padding:35px 40px; box-shadow:0 20px 50px rgba(0,0,0,0.6);
}
.profile h2{ text-align:center; margin-bottom:25px; color:#22c55e; }
.input-group{ margin:12px 0; }
label{ font-size:13px; opacity:0.8; display:block; margin-bottom:5px; }
input[type="text"], input[type="email"], input[type="number"]{
  width:100%; padding:10px 12px; border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.3); color:white; font-size:14px; outline:none;
}
input:focus{ border-color:#22c55e; }
.radio-group{ display:flex; gap:20px; margin-top:8px; font-size:14px; }
.radio-group label{ opacity:1; margin:0; cursor:pointer; }
 
select{
  width:100%; padding:10px 12px; border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.5); color:white; font-size:14px; outline:none;
}
 
button{
  width:100%; padding:12px; margin-top:12px; border:none;
  border-radius:30px; font-weight:600; cursor:pointer; transition:0.3s; font-size:15px;
}
.btn-green{ background:#22c55e; color:#020617; }
.btn-green:hover{ box-shadow:0 8px 20px rgba(34,197,94,0.6); }
.btn-red{ background:#ef4444; color:white; }
.btn-red:hover{ box-shadow:0 8px 20px rgba(239,68,68,0.5); }
 
.result-box{
  margin-top:15px; padding:14px;
  background:rgba(0,0,0,0.4); border-radius:10px;
  font-size:14px; line-height:1.8; display:none;
}
.result-box .stat{ color:#22c55e; font-weight:600; }
</style>
</head>
<body>
 
<nav>
  <div class="logo">Fit<span>Fuel</span></div>
  <div>
    <a href="home.html">Home</a>
    <a href="plans.html">Plans</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>
 
<div class="container">
 
  <!-- Active Plan Badge -->
  <div class="plan-badge">
    <h3>🟢 Active Plan: <span id="planName">Loading...</span></h3>
    <p>Expires: <span id="planExpiry">-</span></p>
    <a href="plans.html">Upgrade Plan →</a>
  </div>
 
  <!-- Profile Form -->
  <div class="profile">
    <h2>My Fitness Profile</h2>
 
    <div class="input-group">
      <label>Name</label>
      <input type="text" id="nameField" placeholder="Your name" readonly style="opacity:0.7">
    </div>
 
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="emailField" placeholder="Your email" readonly style="opacity:0.7">
    </div>
 
    <div class="input-group">
      <label>Age</label>
      <input type="number" id="ageField" placeholder="e.g. 22">
    </div>
 
    <div class="input-group">
      <label>Weight (kg)</label>
      <input type="number" id="weightField" placeholder="e.g. 70">
    </div>
 
    <div class="input-group">
      <label>Height (cm)</label>
      <input type="number" id="heightField" placeholder="e.g. 175">
    </div>
 
    <div class="input-group">
      <label>Gender</label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
      </div>
    </div>
 
    <div class="input-group">
      <label>Activity Level</label>
      <select id="activityField">
        <option value="low">Low (desk job, no exercise)</option>
        <option value="medium">Medium (3-4x/week workout)</option>
        <option value="high">High (daily intense workout)</option>
      </select>
    </div>
 
    <div class="input-group">
      <label>Goal</label>
      <select id="goalField">
        <option value="maintain">Maintain Weight</option>
        <option value="bulk">Bulk (Gain Muscle)</option>
        <option value="cut">Cut (Lose Fat)</option>
      </select>
    </div>
 
    <button class="btn-green" onclick="getSuggestions()">💡 Get Diet Suggestions</button>
 
    <div class="result-box" id="result"></div>
 
    <button class="btn-green" onclick="saveProfile()" style="margin-top:10px;background:#3b82f6;">💾 Save Profile</button>
    <button class="btn-red"   onclick="logout()">🚪 Logout</button>
  </div>
</div>
 
<script>
const API = "http://localhost:3000";
let currentUser = null;
 
// ── ON LOAD ──────────────────────────────────────────────────────
window.onload = function() {
  const stored = localStorage.getItem('user');
  if (!stored) {
    alert("Please login first!");
    location.href = "login.html";
    return;
  }
 
  currentUser = JSON.parse(stored);
  document.getElementById('nameField').value  = currentUser.name  || '';
  document.getElementById('emailField').value = currentUser.email || '';
 
  loadMyPlan();
};
 
// ── LOAD PLAN ────────────────────────────────────────────────────
function loadMyPlan() {
  fetch(API + "/my-plan?userId=" + currentUser.userId)
  .then(r => r.json())
  .then(data => {
    const labels = { basic:'Basic', pro:'Pro ⭐', elite:'Elite 👑' };
    document.getElementById('planName').textContent = labels[data.plan] || data.plan;
 
    if (data.expires_at) {
      const d = new Date(data.expires_at);
      const isForever = d.getFullYear() > 2100;
      document.getElementById('planExpiry').textContent = isForever
        ? 'Lifetime'
        : d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    }
  })
  .catch(() => {
    document.getElementById('planName').textContent = 'Basic';
  });
}
 
// ── GET DIET SUGGESTIONS ─────────────────────────────────────────
function getSuggestions() {
  const weight   = parseFloat(document.getElementById('weightField').value);
  const height   = parseFloat(document.getElementById('heightField').value);
  const age      = parseFloat(document.getElementById('ageField').value);
  const activity = document.getElementById('activityField').value;
  const goal     = document.getElementById('goalField').value;
  const genderEl = document.querySelector('input[name="gender"]:checked');
  const result   = document.getElementById('result');
 
  if (!weight || !height || !age || !genderEl) {
    result.style.display = 'block';
    result.innerHTML = '❌ Please fill Age, Weight, Height and select Gender.';
    return;
  }
 
  const gender = genderEl.value;
 
  // BMI
  const bmi = (weight / ((height/100) ** 2)).toFixed(1);
  let bmiMsg = '';
  if      (bmi < 18.5)             bmiMsg = '🔵 Underweight — focus on strength & high-protein diet.';
  else if (bmi >= 18.5 && bmi < 25) bmiMsg = '🟢 Normal BMI — maintain with balanced diet & workouts.';
  else if (bmi >= 25 && bmi < 30)  bmiMsg = '🟡 Overweight — focus on cardio & calorie deficit.';
  else                              bmiMsg = '🔴 Obese range — start structured plan immediately.';
 
  // Calories
  let bmr = gender === 'male'
    ? 10*weight + 6.25*height - 5*age + 5
    : 10*weight + 6.25*height - 5*age - 161;
 
  const acts = { low:1.2, medium:1.55, high:1.9 };
  let calories = bmr * acts[activity];
  if (goal === 'bulk') calories += 300;
  if (goal === 'cut')  calories -= 300;
 
  const protein = Math.round(weight * 2);
  const carbs   = Math.round(calories * 0.5 / 4);
  const fats    = Math.round(calories * 0.25 / 9);
 
  result.style.display = 'block';
  result.innerHTML = `
    <b style="color:#22c55e">📊 Your Results</b><br><br>
    BMI: <span class="stat">${bmi}</span> — ${bmiMsg}<br><br>
    <b>Daily Targets:</b><br>
    🔥 Calories: <span class="stat">${Math.round(calories)} kcal</span><br>
    🥩 Protein:  <span class="stat">${protein}g</span><br>
    🌾 Carbs:    <span class="stat">${carbs}g</span><br>
    🥑 Fats:     <span class="stat">${fats}g</span><br><br>
    ${gender === 'female'
      ? '💡 Include iron-rich foods and moderate cardio.'
      : '💡 Include muscle-building workouts and protein-rich meals.'}
  `;
}
 
// ── SAVE PROFILE ─────────────────────────────────────────────────
function saveProfile() {
  const weight   = document.getElementById('weightField').value;
  const height   = document.getElementById('heightField').value;
  const age      = document.getElementById('ageField').value;
  const activity = document.getElementById('activityField').value;
  const goal     = document.getElementById('goalField').value;
  const genderEl = document.querySelector('input[name="gender"]:checked');
 
  if (!weight || !height || !age || !genderEl) {
    alert("Please fill all fields before saving.");
    return;
  }
 
  fetch(API + "/profile", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId:   currentUser.userId,
      age:      age,
      height:   height,
      weight:   weight,
      gender:   genderEl.value,
      activity: activity,
      goal:     goal
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) alert("✅ Profile saved!");
    else              alert("❌ Could not save profile.");
  })
  .catch(() => alert("❌ Server error."));
}
 
// ── LOGOUT ───────────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('user');
  location.href = "home.html";
}
</script>
</body>
</html>
