<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fat Burning | FitFuel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  color:white;
  background:
    linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.95)),
    url("https://images.unsplash.com/photo-1594737625785-cce6f3c1f14c");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* BACK BUTTON */
.back{
  margin:20px;
}

.back a{
  display:inline-block;
  padding:10px 22px;
  background:#22c55e;
  color:#020617;
  border-radius:20px;
  text-decoration:none;
  font-weight:600;
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px 20px;
}

header h1{
  color:#22c55e;
  margin-bottom:10px;
}

/* MOTIVATION */
.motivation{
  max-width:850px;
  margin:20px auto 0;
  font-size:18px;
  line-height:1.6;
  color:#e5e7eb;
}

.motivation span{
  opacity:0;
  display:inline-block;
  animation:reveal 0.04s forwards;
}

@keyframes reveal{
  to{ opacity:1; }
}

/* VIDEOS GRID */
.videos{
  padding:40px 8%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

/* GLASS CARD */
.video-card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:14px;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:transform 0.35s ease;
}

.video-card:hover{
  transform:scale(1.15);
  z-index:10;
}

iframe{
  width:100%;
  height:200px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="back">
  <a href="home.html">⬅ Back to Programs</a>
</div>

<header>
  <h1>Fat Burning Workouts</h1>

  <div class="motivation" id="motivationText">
    Burn fat, build confidence, and feel unstoppable.
    These workouts push your body to melt calories fast.
    Stay consistent — results will follow.
  </div>
</header>

<div class="videos">
  <div class="video-card">
    <iframe src="https://www.youtube.com/embed/2pLT-olgUJs" allowfullscreen></iframe>
  </div>

  <div class="video-card">
    <iframe src="https://www.youtube.com/embed/gC_L9qAHVJ8" allowfullscreen></iframe>
  </div>

  <div class="video-card">
    <iframe src="https://www.youtube.com/embed/sQX8gqE7fWI" allowfullscreen></iframe>
  </div>
</div>

<script>
/* LETTER-BY-LETTER TEXT ANIMATION */
const el = document.getElementById("motivationText");
const text = el.innerHTML;
el.innerHTML = "";

let delay = 0;
text.split("").forEach(char => {
  const span = document.createElement("span");
  span.innerHTML = char === " " ? "&nbsp;" : char;
  span.style.animationDelay = `${delay}s`;
  delay += 0.03;
  el.appendChild(span);
});
</script>

</body>
</html>
